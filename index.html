<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TaskLog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Personal timestamp-based task & finance logger">
  <meta name="theme-color" content="#1a1a1a">

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TaskLog">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png">
  <link rel="apple-touch-startup-image" href="icons/apple-splash-2048x2732.png"
        media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)">
  <link rel="apple-touch-startup-image" href="icons/apple-splash-1170x2532.png"
        media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="icons/apple-splash-1284x2778.png"
        media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)">

  <link rel="stylesheet" href="styles.css">
  <script src="vendor/marked.min.js"></script>
  <script src="vendor/purify.min.js"></script>
</head>
<body data-theme="sakura">
  <header id="topbar">
    <button id="prevMonth" class="iconbtn" aria-label="Previous month">‹</button>
    <button id="monthLabel" class="monthbtn" aria-label="Current month">…</button>
    <button id="nextMonth" class="iconbtn" aria-label="Next month">›</button>
    <div id="viewSwitch" class="seg" role="tablist">
      <button type="button" data-view="notes" class="active">Notes</button>
      <button type="button" data-view="finance">Finance</button>
      <button type="button" data-view="memory">Memory</button>
    </div>
    <input id="search" type="search" placeholder="Search…" autocomplete="off">
    <button id="pendingBadge" class="iconbtn pending" hidden aria-label="Pending sync">⏳ 0</button>
    <button id="newBtn" class="primary" aria-label="New entry">+ New</button>
    <button id="settingsBtn" class="iconbtn" aria-label="Settings">⚙</button>
  </header>

  <!-- Notes: tag filter chips -->
  <div id="tagbar" hidden></div>

  <!-- Finance: summary + filters -->
  <div id="financebar" hidden>
    <div id="financeSummary" class="financeSummary"></div>
    <div id="financeFilters" class="financeFilters"></div>
  </div>

  <main id="timeline">
    <div class="empty"><p>Loading…</p></div>
  </main>

  <div id="status" class="status" hidden></div>

  <!-- iOS install hint -->
  <div id="iosHint" class="banner" hidden>
    Install: tap <strong>Share</strong> → <strong>Add to Home Screen</strong>.
    <button id="iosHintClose" aria-label="Dismiss">×</button>
  </div>

  <!-- Note composer -->
  <dialog id="composer">
    <form method="dialog" id="composerForm">
      <header class="composerHead">
        <strong id="composerTitle">New note</strong>
        <span id="composerTime" class="ts">--:--</span>
        <button type="button" id="composerCancel" class="iconbtn" aria-label="Close">×</button>
      </header>
      <input id="composerHeading" type="text" placeholder="Heading" required>
      <textarea id="composerBody" placeholder="Markdown body. Paste images here. Use #tags." rows="8"></textarea>
      <div id="composerThumbs" class="thumbs"></div>
      <footer class="composerFoot">
        <label class="filebtn">
          + Image
          <input id="composerFiles" type="file" accept="image/*" multiple hidden>
        </label>
        <button type="button" id="composerPreview" class="iconbtn" title="Toggle preview">⎚</button>
        <span class="grow"></span>
        <button type="submit" class="primary" id="composerSave">Save</button>
      </footer>
      <div id="composerPreviewPane" class="preview" hidden></div>
    </form>
  </dialog>

  <!-- Finance composer -->
  <dialog id="financeComposer">
    <form method="dialog" id="financeForm">
      <header class="composerHead">
        <strong id="financeTitle">New finance record</strong>
        <span id="financeTime" class="ts">--:--</span>
        <button type="button" id="financeCancel" class="iconbtn" aria-label="Close">×</button>
      </header>
      <div class="seg typeSeg" id="financeType">
        <button type="button" data-ftype="expense" class="active">Expense</button>
        <button type="button" data-ftype="income">Income</button>
      </div>
      <div class="frow">
        <label>Category
          <select id="financeCategorySel" required></select>
        </label>
        <label>Subcategory
          <select id="financeSubcategorySel"></select>
        </label>
      </div>
      <label>Amount (৳)
        <input id="financeAmount" type="number" step="0.01" min="0" required placeholder="0.00" inputmode="decimal">
      </label>
      <label>Tags (optional, space-separated)
        <input id="financeTagsInput" type="text" placeholder="e.g. weekly groceries">
      </label>
      <textarea id="financeNote" placeholder="Note (optional, Markdown). Paste images here." rows="3"></textarea>
      <div id="financeThumbs" class="thumbs"></div>
      <div id="financeHint" class="settingsStatus"></div>
      <footer class="composerFoot">
        <label class="filebtn">
          + Image
          <input id="financeFiles" type="file" accept="image/*" multiple hidden>
        </label>
        <span class="grow"></span>
        <button type="submit" class="primary" id="financeSave">Save</button>
      </footer>
    </form>
  </dialog>

  <!-- Memory composer -->
  <dialog id="memoryComposer">
    <form method="dialog" id="memoryForm">
      <header class="composerHead">
        <strong id="memoryTitle">New memory item</strong>
        <button type="button" id="memoryCancel" class="iconbtn" aria-label="Close">×</button>
      </header>
      <label>Key
        <input id="memoryKey" type="text" placeholder="e.g. WiFi password" required>
      </label>
      <label>Value type
        <select id="memoryType">
          <option value="text">Text</option>
          <option value="number">Number</option>
          <option value="date">Date</option>
        </select>
      </label>
      <label>Value
        <input id="memoryValue" type="text" placeholder="Value">
      </label>
      <div id="memoryHint" class="settingsStatus"></div>
      <footer class="composerFoot">
        <span class="grow"></span>
        <button type="submit" class="primary" id="memorySave">Save</button>
      </footer>
    </form>
  </dialog>

  <!-- Categories manager -->
  <dialog id="categories">
    <form method="dialog" id="categoriesForm">
      <header class="composerHead">
        <strong>Manage categories</strong>
        <button type="button" id="categoriesCancel" class="iconbtn" aria-label="Close">×</button>
      </header>
      <p class="hint">Categories and subcategories are shared across all your devices.</p>
      <div id="categoriesList"></div>
      <div class="frow">
        <input id="newCategoryInput" type="text" placeholder="New category name">
        <button type="button" id="addCategoryBtn">Add category</button>
      </div>
      <div id="categoriesStatus" class="settingsStatus"></div>
      <footer class="composerFoot">
        <span class="grow"></span>
        <button type="submit" class="primary" id="categoriesSave">Save</button>
      </footer>
    </form>
  </dialog>

  <!-- Print / export -->
  <dialog id="printDialog">
    <form method="dialog" id="printForm">
      <header class="composerHead">
        <strong>Print / Export records</strong>
        <button type="button" id="printCancel" class="iconbtn" aria-label="Close">×</button>
      </header>
      <p class="hint">Choose a date range. The browser print dialog can save it as a PDF.</p>
      <div class="frow">
        <label>From <input id="printFrom" type="date"></label>
        <label>To <input id="printTo" type="date"></label>
      </div>
      <label class="chk"><input id="printNotes" type="checkbox" checked> Include notes</label>
      <label class="chk"><input id="printFinance" type="checkbox" checked> Include finance records</label>
      <div id="printStatus" class="settingsStatus"></div>
      <footer class="composerFoot">
        <span class="grow"></span>
        <button type="submit" class="primary" id="printGo">Prepare &amp; print</button>
      </footer>
    </form>
  </dialog>

  <!-- Settings -->
  <dialog id="settings">
    <form method="dialog" id="settingsForm">
      <header class="composerHead">
        <strong>Settings</strong>
        <button type="button" id="settingsCancel" class="iconbtn" aria-label="Close">×</button>
      </header>
      <label>GitHub repo (owner/name)
        <input id="settingsRepo" type="text" placeholder="yourname/task-log-data" required>
      </label>
      <label>Default branch
        <input id="settingsBranch" type="text" placeholder="main" value="main">
      </label>
      <label>Personal Access Token (fine-grained)
        <input id="settingsPat" type="password" placeholder="github_pat_…" required>
      </label>
      <label>Theme
        <select id="settingsTheme">
          <option value="sakura">Sakura</option>
          <option value="monokai">Monokai</option>
          <option value="ember">Ember</option>
          <option value="forest">Forest</option>
          <option value="solarized">Solarized Light</option>
        </select>
      </label>
      <div id="settingsStatus" class="settingsStatus"></div>
      <footer class="composerFoot composerFootWrap">
        <button type="button" id="settingsTest">Test connection</button>
        <button type="button" id="settingsCategories">Manage categories</button>
        <button type="button" id="settingsPrint">Print / Export</button>
        <button type="button" id="settingsRefreshIndex">Refresh search index</button>
        <span class="grow"></span>
        <button type="submit" class="primary">Save</button>
      </footer>
    </form>
  </dialog>

  <!-- Lightbox -->
  <dialog id="lightbox" class="lightbox">
    <img id="lightboxImg" alt="">
  </dialog>

  <!-- Print output (hidden on screen, shown only when printing) -->
  <div id="printArea"></div>

  <script type="module" src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(console.error);
      });
    }
  </script>
</body>
</html>
